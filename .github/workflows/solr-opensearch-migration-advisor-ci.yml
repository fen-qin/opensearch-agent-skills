name: Solr -> OpenSearch Migration Advisor CI

# Uses --extra dev only (pytest + flake8); --extra eval is intentionally
# omitted because it pulls claude-agent-sdk for tests/evals/, which makes
# real AWS Bedrock / Anthropic calls.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Install skill (dev extras only)
        working-directory: skills/solr-opensearch-migration-advisor
        run: uv sync --frozen --extra dev
      - name: Run tests
        working-directory: skills/solr-opensearch-migration-advisor
        run: uv run pytest tests/ -v

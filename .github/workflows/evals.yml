name: Skill Evals

# Runs LLM-based skill evaluation tests (Layer 3b).
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) — run on demand, with optional ref input
#     for evaluating fork PRs after maintainer review
#   - Weekly schedule — Monday 06:00 UTC
#   - Push to main touching skill content or eval fixtures/tests
#   - pull_request for same-repo PRs, or fork PRs opened by a maintainer
#     listed in .github/CODEOWNERS (secrets available via OIDC)
#   - pull_request_review (submitted) for all other (external) fork PRs —
#     runs ONLY when a maintainer submits an "Approve" review, and ONLY
#     against the exact commit that review was submitted against
#     (review.commit_id).
#
# Security: pull_request_target has been intentionally removed to prevent
# secret exfiltration via malicious fork PRs. The label/approval-click
# pattern from PR #75 was rejected for the same reason: neither a label
# nor a generic environment-approval click is cryptographically or
# procedurally bound to the commit that ends up executing with secrets —
# a later push can silently ride along on an earlier approval.
#
# Maintainer trust check: whether a PR is "trusted" (same as a same-repo
# PR) is decided by check-maintainer.yml, which reads .github/CODEOWNERS
# from the BASE branch only (never the PR head) and compares the PR
# author's login against it. This lets maintainers use personal forks
# without losing the immediate-run behavior, while keeping the actual
# trust decision anchored to reviewed, base-repo content rather than
# anything the PR author controls. This does not, by itself, grant
# secrets — it only decides which already-safe trigger path (same-repo
# pull_request semantics) an event should be treated as following.
#
# External (non-CODEOWNERS) fork PRs are evaluated via the
# pull_request_review trigger instead:
#   - It only fires from an actual PR review submission (the same screen
#     that renders the diff) — there is no separate "infra approval" UI
#     that can be clicked without viewing the code.
#   - GitHub stamps every review with the exact commit_id it was
#     submitted against. The job's `if:` guard requires
#     review.commit_id == pull_request.head.sha (i.e. nothing has been
#     pushed since the review), and checkout is pinned to
#     review.commit_id explicitly — never the PR's live head.
#   - Branch protection on main should enable "Dismiss stale pull request
#     approvals when new commits are pushed" so a follow-up push
#     automatically invalidates the prior approval, closing the loop:
#     a new commit can never run with secrets until it is reviewed again.
#   - Note: pull_request_review for fork PRs is still delivered to the
#     base repository (same as pull_request_target) and DOES have access
#     to secrets. Safety here comes entirely from the commit_id binding
#     above, not from secrets being withheld.
#
# Accepted tradeoff: a maintainer whose account is compromised can still
# get secrets on every push from their personal fork, same as they
# always could from a same-repo branch. This check does not add or
# remove that risk — it only extends existing same-repo trust to cover
# maintainers who happen to work from personal forks.
#
# Requires BEDROCK_ACCESS_ROLE repository secret (IAM role ARN).
# The role is assumed via GitHub OIDC — no static AWS keys stored.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to evaluate (SHA or branch). Use for fork PRs after review.'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'tests/evals/**'
      - '.github/workflows/evals.yml'
  pull_request:
    paths:
      - 'skills/**'
      - 'tests/evals/**'
      - '.github/workflows/evals.yml'
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  id-token: write   # required for OIDC role assumption

concurrency:
  group: evals-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-maintainer:
    # Only meaningful for pull_request events; skip entirely for
    # push/schedule/workflow_dispatch to avoid an unnecessary runner.
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/check-maintainer.yml

  evals:
    name: Skill Evals (LLM)
    needs: [check-maintainer]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # always() is required here: check-maintainer is skipped entirely on
    # non-pull_request events (push/schedule/workflow_dispatch), and by
    # default GitHub Actions auto-skips any job whose `needs` dependency
    # was skipped — regardless of this job's own `if:` result. always()
    # overrides that propagation so the condition below is actually
    # evaluated on every trigger. See: actions/runner#491.
    #
    # Run unless:
    #   - this is a plain pull_request from a fork whose author is NOT a
    #     listed maintainer (no secrets available; use pull_request_review
    #     or workflow_dispatch instead), or
    #   - this is a pull_request_review that is not an approval, or is an
    #     approval that is now stale (a commit landed after the review).
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository ||
       needs.check-maintainer.outputs.is-maintainer == 'true')
      &&
      (github.event_name != 'pull_request_review' ||
       (github.event.review.state == 'approved' &&
        github.event.review.commit_id == github.event.pull_request.head.sha))

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Priority: explicit workflow_dispatch input > reviewed commit
          # (pull_request_review — pinned to the exact SHA that was
          # approved, never the PR's live head) > default trigger SHA.
          ref: ${{ inputs.ref || github.event.review.commit_id || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install UV
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      # This ROLE should not be shared with PR review
      # And should be managed by the opensearch-agent-skills team
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.BEDROCK_ACCESS_ROLE_EVALS }}
          aws-region: us-east-1

      - name: Install eval dependencies
        run: uv sync --group evals

      # Phase 1: run all eval cases, collect results.
      - name: Run eval cases
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          uv run --group evals pytest tests/evals/ \
            --run-eval \
            -v

      # Phase 2: analyze aggregated results and enforce thresholds.
      # Fails if pass rate drops below 80%.
      - name: Analyze eval results
        run: |
          uv run --group evals pytest tests/evals/ --run-eval-analysis -v

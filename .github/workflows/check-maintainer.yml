name: Check if PR author is in CODEOWNERS

# Determines whether the PR author's login appears in .github/CODEOWNERS.
# Used only to decide whether a fork PR should be treated like a
# same-repo PR for eval purposes (see evals.yml).
#
# Security: reads CODEOWNERS from the BASE branch only
# (pull_request.base.sha), never from the PR head, so the trust decision
# never depends on anything the PR author controls.

on:
  workflow_call:
    outputs:
      is-maintainer:
        description: "'true' if the PR author's login appears in CODEOWNERS"
        value: ${{ jobs.check.outputs.is-maintainer }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      is-maintainer: ${{ steps.check.outputs.is-maintainer }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/CODEOWNERS
          sparse-checkout-cone-mode: false

      - id: check
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Match "@<author>" as an exact token (bounded by whitespace or
          # line start/end). A plain `grep -w` would wrongly match a
          # substring (e.g. author "fen" inside "@fen-qin") or a team
          # handle (e.g. author "opensearch-project" inside
          # "@opensearch-project/docs-team"), since it treats "-" and
          # "/" as word boundaries — this anchors on whitespace instead.
          if grep -qiE "(^|[[:space:]])@${PR_AUTHOR}([[:space:]]|$)" .github/CODEOWNERS 2>/dev/null; then
            echo "is-maintainer=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-maintainer=false" >> "$GITHUB_OUTPUT"
          fi

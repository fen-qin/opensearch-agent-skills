name: Skill Evals

# Runs LLM-based skill evaluation tests (Layer 3b).
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) — run on demand
#   - Weekly schedule — Monday 06:00 UTC
#   - Push to main touching skill content or eval fixtures/tests
#   - pull_request_target with 'safe to test' label — allows fork PRs to run
#     evals after a maintainer reviews and labels the PR. Uses the base repo
#     context so BEDROCK_ACCESS_ROLE secret is available.
#
# Security note: pull_request_target runs in the base repo context (has secrets)
# but checks out the PR head. This is safe here because the eval tests only read
# skill markdown files — they do not build or execute untrusted code from the PR.
#
# Requires BEDROCK_ACCESS_ROLE repository secret (IAM role ARN).
# The role is assumed via GitHub OIDC — no static AWS keys stored.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'tests/evals/**'
      - '.github/workflows/evals.yml'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'tests/evals/**'
      - '.github/workflows/evals.yml'
  pull_request_target:
    types: [labeled]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'tests/evals/**'
      - '.github/workflows/evals.yml'

permissions:
  contents: write   # needed to commit updated baseline on main
  id-token: write   # required for OIDC role assumption

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: Skill Evals (LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # For pull_request_target: only run when a maintainer adds 'safe to test' label.
    # For all other triggers (push, schedule, workflow_dispatch, pull_request from
    # org members): always run.
    if: |
      github.event_name != 'pull_request_target' ||
      contains(github.event.pull_request.labels.*.name, 'safe to test')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For pull_request_target, check out the PR head so evals run against
          # the contributor's skill changes, not the base branch.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UV
        uses: astral-sh/setup-uv@v6

      # Authenticate to AWS using OIDC — same pattern as opensearch-build's
      # code-diff-reviewer workflow. Requires BEDROCK_ACCESS_ROLE secret
      # (an IAM role ARN with bedrock:InvokeModel permission).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BEDROCK_ACCESS_ROLE }}
          aws-region: us-east-1

      - name: Install eval dependencies
        run: uv sync --group evals

      # Phase 1: run all eval cases, collect results.
      - name: Run eval cases
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          uv run --group evals pytest tests/evals/ \
            --run-eval \
            -v

      # Phase 2: analyze aggregated results and enforce thresholds.
      # Fails if pass rate drops below 80%.
      - name: Analyze eval results
        run: |
          uv run --group evals pytest tests/evals/ --run-eval-analysis -v

      # Phase 3: run workflow benchmark and compare against stored baseline.
      # Fails if any dimension regresses >10% from baseline.
      - name: Run workflow benchmark
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          uv run --group evals python scripts/run_benchmark.py \
            --runs 1 \
            --tag "ci-${{ github.sha }}" \
            --output tests/evals/results/ci-run.json

      - name: Compare against baseline
        run: |
          uv run --group evals python scripts/compare_baseline.py \
            --baseline tests/evals/results/baseline.json \
            --current tests/evals/results/ci-run.json \
            --threshold 0.10

      # Update baseline only on push to main, and only if ALL dimensions improved.
      # This prevents downward drift — baseline only ratchets up.
      - name: Update baseline if improved
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          uv run --group evals python scripts/update_baseline.py \
            --baseline tests/evals/results/baseline.json \
            --current tests/evals/results/ci-run.json

      - name: Commit updated baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git diff --quiet tests/evals/results/baseline.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/evals/results/baseline.json
          git commit -m "chore: update eval baseline (all dimensions improved)"
          git push


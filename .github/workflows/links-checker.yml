name: Link Checker

on:
  push:
    paths:
      - '**/*.md'
      - 'lychee.toml'
      - '.github/workflows/links-checker.yml'
  pull_request:
    paths:
      - '**/*.md'
      - 'lychee.toml'
      - '.github/workflows/links-checker.yml'

jobs:
  check-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # User agent, timeouts, retries, accepted status codes and host
          # excludes (including the Docusaurus-SPA awslabs.github.io/mcp/*
          # workaround) live in lychee.toml so local `lychee` runs and CI
          # share the same config.
          args: >-
            --config lychee.toml
            --verbose
            --no-progress
            '**/*.md'
          fail: true
